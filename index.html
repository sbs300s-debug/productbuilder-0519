<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">Movie Mood - 당신의 기분을 읽는 맞춤형 영화 큐레이션</title>
    <meta name="description" content="전문가가 엄선한 감정 분석 영화 추천 서비스. 행복, 슬픔, 열정, 평온 등 현재 기분에 가장 잘 어울리는 영화를 찾아보세요. 고품질 큐레이션 데이터를 제공합니다.">
    <meta name="google-adsense-account" content="ca-pub-2356263208847868">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2356263208847868"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="header-title" onclick="location.href='index.html'" style="cursor:pointer">🎬 Movie Mood</h1>
        <nav class="main-nav">
            <a href="index.html" id="home-link-text">홈</a>
            <a href="#about-area" class="about-title-text">서비스 철학</a>
            <button id="lang-toggle">English</button>
            <button id="theme-toggle">다크 모드</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2 id="hero-msg">지금 어떤 기분이신가요?</h2>
            <p id="hero-submsg">감정 분석 큐레이션을 통해 당신의 현재 기분에 가장 깊은 공감을 선사할 영화를 추천해 드립니다.</p>
        </section>

        <section class="mood-selector" id="mood-buttons">
            <!-- Buttons will be generated by JS -->
        </section>

        <section id="recommendation-area" class="recommendation-area">
            <h2 id="result-title">오늘의 추천 큐레이션</h2>
            <div id="movie-grid" class="movie-grid">
                <!-- Movie cards will be generated by JS -->
            </div>
        </section>

        <section id="about-area" class="about-area">
            <h2 id="about-title" class="about-title-text">서비스 철학</h2>
            <p id="about-content" class="about-content-text">Movie Mood는 단순한 영화 목록 제공을 넘어, 인간의 보편적인 감정과 영화라는 예술 매체를 연결하는 전문 큐레이션 플랫폼입니다.</p>
        </section>

        <section id="comment-area" class="comment-area">
            <h2 id="comment-title">시청 후기 및 커뮤니티</h2>
            <script src="https://utteranc.es/client.js"
                    repo="sbs300s-debug/product-builder-lecture"
                    issue-term="pathname"
                    theme="github-light"
                    crossorigin="anonymous"
                    async>
            </script>
        </section>

        <section id="contact-area" class="contact-area">
            <h2 id="contact-title">비즈니스 및 제휴 문의</h2>
            <form action="https://formspree.io/f/mgoqweqr" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="email" id="label-email">이메일 주소</label>
                    <input type="email" name="email" id="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message" id="label-message">문의 내용</label>
                    <textarea name="message" id="message" required placeholder="문의하실 내용을 상세히 입력해주세요."></textarea>
                </div>
                <button type="submit" id="submit-btn" class="submit-btn">문의 메시지 보내기</button>
            </form>
        </section>
    </main>

    <footer>
        <p id="footer-text">&copy; 2024 Movie Mood. All rights reserved.</p>
        <div class="footer-links">
            <a href="privacy.html" id="privacy-link-text">개인정보처리방침</a> | 
            <a href="sitemap.xml">Sitemap</a>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
