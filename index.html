<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">기분별 영화 추천 - Movie Mood</title>
    <meta name="description" content="오늘의 기분에 맞는 영화를 추천받으세요. 행복, 슬픔, 신남 등 감정에 따른 최고의 영화 큐레이션 서비스를 제공합니다.">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2356263208847868"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="header-title">🎬 Movie Mood</h1>
        <div class="controls">
            <button id="lang-toggle">English</button>
            <button id="theme-toggle">다크 모드</button>
        </div>
    </header>

    <main>
        <section class="hero">
            <h2 id="hero-msg">오늘의 기분은 어떠신가요?</h2>
            <p id="hero-submsg">당신의 기분에 딱 맞는 영화를 추천해 드립니다. 다양한 장르의 영화를 만나보세요.</p>
        </section>

        <section class="mood-selector" id="mood-buttons">
            <!-- Buttons will be generated by JS -->
        </section>

        <section id="recommendation-area" class="recommendation-area">
            <h2 id="result-title">추천 영화</h2>
            <div id="movie-grid" class="movie-grid">
                <!-- Movie cards will be generated by JS -->
            </div>
        </section>

        <section id="about-area" class="about-area">
            <h2 id="about-title">서비스 소개</h2>
            <p id="about-content">Movie Mood는 사용자의 현재 감정 상태에 가장 적합한 영화를 인공지능과 큐레이션을 통해 추천해드리는 서비스입니다.</p>
        </section>

        <section id="comment-area" class="comment-area">
            <h2 id="comment-title">댓글 및 후기</h2>
            <script src="https://utteranc.es/client.js"
                    repo="sbs300s-debug/product-builder-lecture"
                    issue-term="pathname"
                    theme="github-light"
                    crossorigin="anonymous"
                    async>
            </script>
        </section>

        <section id="contact-area" class="contact-area">
            <h2 id="contact-title">제휴 및 비즈니스 문의</h2>
            <form action="https://formspree.io/f/mgoqweqr" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="email" id="label-email">이메일 주소</label>
                    <input type="email" name="email" id="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message" id="label-message">문의 내용</label>
                    <textarea name="message" id="message" required placeholder="문의하실 내용을 상세히 입력해주세요."></textarea>
                </div>
                <button type="submit" id="submit-btn" class="submit-btn">문의하기</button>
            </form>
        </section>
    </main>

    <footer>
        <p id="footer-text">&copy; 2024 Movie Mood. All rights reserved.</p>
        <p><a href="privacy.html" id="privacy-link" style="color: var(--text-color); text-decoration: underline;">개인정보처리방침</a></p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
